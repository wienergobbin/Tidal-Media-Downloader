name: Build exe

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # -------------------------
    # OS‑specific GUI dependencies
    # -------------------------

    - name: Install GUI deps (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y \
          libgtk-3-dev \
          libglib2.0-dev \
          libgdk-pixbuf2.0-dev \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxrandr-dev \
          libxfixes-dev \
          libxi-dev \
          libxcursor-dev \
          libxinerama-dev

    - name: Install GUI deps (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install gtk+3

    - name: Install GUI deps (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        echo "Windows GUI dependencies usually bundled with toolchain"
        echo "Add MSYS2 or vcpkg if needed"

    # -------------------------
    # Build step (example)
    # -------------------------
    - name: Build
      run: |
        echo "Insert your build command here"
